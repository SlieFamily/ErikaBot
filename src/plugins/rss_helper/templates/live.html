<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-body: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 100%); /* 外层底色：粉紫渐变 */
            --bg-card: rgba(255, 255, 255, 0.65); /* 卡片底色：半透明纯白 */
            --text-main: #0F172A;
            --text-sub: #64748B;
            --accent-gradient: linear-gradient(135deg, #FF6699 0%, #FF8C69 100%);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 10px; /* 周边的粉色背景保持极窄、精致 */
            display: inline-block; /* 保证截图尺寸完美贴合的关键 */
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5); 
            width: 540px; /* 【修改】卡片变窄，540px 黄金宽度适合手机端阅读 */
            border-radius: 32px; 
            padding: 32px; /* 【修改】稍微收紧内边距配合窄卡片 */
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.08), 0 4px 6px rgba(0,0,0,0.02);
        }

        /* 沉浸式封面设计 */
        .cover-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            background: #E2E8F0;
            margin-bottom: 24px;
        }

        .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 高级毛玻璃悬浮组件通用样式 */
        .glass-badge {
            position: absolute;
            top: 20px;
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #FFFFFF;
            padding: 10px 20px; /* 【修改】增加内边距让标签更大 */
            border-radius: 24px;
            font-size: 16px; /* 【修改】标签字体放大 */
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
        }

        /* 左上角：直播状态与呼吸灯 */
        .live-status {
            left: 18px;
        }

        .live-dot {
            width: 10px; /* 【修改】红点随字体一起放大 */
            height: 10px;
            background: #EF4444; 
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #EF4444;
        }

        /* 右上角：分区徽章 */
        .area-status {
            right: 20px;
        }

        /* 底部信息区 */
        .info-wrap {
            padding: 0 4px; /* 轻微内缩 */
        }

        .title {
            font-size: 26px; /* 【修改】直播标题大幅度放大 */
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 作者与时间的 Flex 排版 */
        .meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .author-box {
            display: flex;
            align-items: center;
        }

        .up-tag {
            background: #F1F5F9;
            color: #64748B;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 16px; /* 【修改】UP主标识放大 */
            font-weight: 800;
            margin-right: 12px;
            border: 1px solid #E2E8F0;
        }

        .name {
            font-size: 20px; /* 【修改】名字放大 */
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .time {
            font-size: 16px; /* 【修改】时间放大 */
            font-weight: 600;
            color: var(--text-sub);
        }
    </style>
</head>
<body>
    <div class="card" id="dynamic-card">
        <div class="cover-wrap">
            <img src="{{ cover }}">
            
            <div class="glass-badge live-status">
                <div class="live-dot"></div>
                正在直播
            </div>

            <div class="glass-badge area-status">
                🎮 {{ area }}
            </div>
        </div>

        <div class="info-wrap">
            <div class="title">{{ title }}</div>
            
            <div class="meta-bar">
                <div class="author-box">
                    <span class="up-tag">UP主</span>
                    <span class="name">{{ name }}</span>
                </div>
                <div class="time">{{ live_time }} 开播</div>
            </div>
        </div>
    </div>
</body>
</html>
