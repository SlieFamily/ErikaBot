<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-main: #0F172A;
            --text-sub: #64748B;
            --accent-gradient: linear-gradient(135deg, #FF6699 0%, #FF8C69 100%);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 40px; 
            display: inline-block;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: var(--bg-card);
            width: 640px; /* 稍微加宽，让 16:9 封面更具张力 */
            border-radius: 32px; /* 更大的苹果级圆角 */
            padding: 24px; /* 减小内边距，让封面几乎撑满屏幕 */
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.08), 0 4px 6px rgba(0,0,0,0.02);
        }

        /* 沉浸式封面设计 */
        .cover-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            background: #E2E8F0;
            margin-bottom: 24px;
        }

        .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 高级毛玻璃悬浮组件通用样式 */
        .glass-badge {
            position: absolute;
            top: 16px;
            background: rgba(15, 23, 42, 0.6); /* 深灰底色 */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #FFFFFF;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
        }

        /* 左上角：直播状态与呼吸灯 */
        .live-status {
            left: 16px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #EF4444; /* 鲜艳的红色 */
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #EF4444;
        }

        /* 右上角：分区徽章 */
        .area-status {
            right: 16px;
        }

        /* 底部信息区 */
        .info-wrap {
            padding: 0 8px; /* 让文字和图片有轻微的内缩，增加层次 */
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.4;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 作者与时间的 Flex 排版 */
        .meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .author-box {
            display: flex;
            align-items: center;
        }

        .up-tag {
            background: #F1F5F9;
            color: #64748B;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 800;
            margin-right: 10px;
            border: 1px solid #E2E8F0;
        }

        .name {
            font-size: 18px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .time {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
        }
    </style>
</head>
<body>
    <div class="card" id="dynamic-card">
        <div class="cover-wrap">
            <img src="{{ cover }}">
            
            <div class="glass-badge live-status">
                <div class="live-dot"></div>
                正在直播
            </div>

            <div class="glass-badge area-status">
                🎮 {{ area }}
            </div>
        </div>

        <div class="info-wrap">
            <div class="title">{{ title }}</div>
            
            <div class="meta-bar">
                <div class="author-box">
                    <span class="up-tag">UP主</span>
                    <span class="name">{{ name }}</span>
                </div>
                <div class="time">{{ live_time }} 开播</div>
            </div>
        </div>
    </div>
</body>
</html>
